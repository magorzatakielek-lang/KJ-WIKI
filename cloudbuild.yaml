steps:
  # 1. Budowanie aplikacji głównej
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/app-image:$COMMIT_SHA', '.']

  # 2. Budowanie Nginxa (używa obrazu nginx jako bazy)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/nginx-image:$COMMIT_SHA', '-f', 'Dockerfile.nginx', '.']
    # UWAGA: Musisz mieć plik Dockerfile.nginx w swoim GitHubie!

  # 3. Wysłanie obrazów do rejestru
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/app-image:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/nginx-image:$COMMIT_SHA']

  # 4. Aktualizacja Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run', 'services', 'update', '$_SERVICE_NAME',
        '--region', '$_DEPLOY_REGION',
        '--container', 'app-container', '--image', '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/app-image:$COMMIT_SHA',
        '--container', 'nginx-container', '--image', '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/nginx-image:$COMMIT_SHA'
      ]

options:
  logging: CLOUD_LOGGING_ONLY

